name: DouM
version: 0.1.0-SNAPSHOT
main: io.github.doum.deathgates.DeathGatesPlugin
api-version: '1.21.11'
description: Configurable death-count gates for Paper and Folia servers.
author: Redstonexs
folia-supported: true

commands:
  doum:
    description: Manage DouM configuration and player death counts.
    usage: /doum <reload|deaths|setdeaths>

permissions:
  doum.admin.reload:
    description: Allows reloading DouM configuration.
    default: op
  doum.deathnum.admin.view:
    description: Allows viewing player death counts.
    default: op
  doum.deathnum.admin.set:
    description: Allows setting player death counts.
    default: op
  doum.deathnum.bypass.*:
    description: Allows bypassing all DouM operation checks.
    default: op
    children:
      doum.deathnum.bypass.block-break: true
      doum.deathnum.bypass.block-place: true
      doum.deathnum.bypass.craft-item: true
  doum.deathnum.bypass.block-break:
    description: Allows bypassing block break gates.
    default: false
  doum.deathnum.bypass.block-place:
    description: Allows bypassing block place gates.
    default: false
  doum.deathnum.bypass.craft-item:
    description: Allows bypassing craft item gates.
    default: false
